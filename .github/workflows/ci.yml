name: ci

on:
  push:
    branches: [main, master, dev]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
